services:
  - type: web
    name: aria-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: OLLAMA_BASE_URL
        sync: false  # Set manually to your ngrok URL
      - key: OLLAMA_MODEL
        value: "gemma3:12b"
      - key: OLLAMA_MODEL_FAST
        value: "gemma3:1b"
      - key: CORS_ORIGINS
        sync: false  # Set to your Vercel frontend URL
      - key: NCBI_API_KEY
        sync: false  # Optional
